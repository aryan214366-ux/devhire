<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Login & Signup</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
    body {
      height:100vh; display:flex; justify-content:center; align-items:center;
     background-image:url(logo.jpg);
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;}
    .container {
      background:#fff; padding:40px; border-radius:15px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      width:360px; text-align:center;
    }
    h2 { margin-bottom:20px; color:#333; }
    input {
      width:100%; padding:12px; margin:10px 0;
      border:1px solid #ccc; border-radius:8px; outline:none;
    }
    button {
      width:100%; padding:12px; margin-top:10px;
      background:#667eea; border:none; color:white;
      border-radius:8px; font-size:16px; cursor:pointer;
    }
    .link { margin-top:12px; color:#667eea; cursor:pointer; font-size:14px; }
    .error { color:red; font-size:14px; margin-top:10px; }
  </style>
</head>
<body>

<div class="container">
  <h2 id="title">User Login</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <input type="password" id="confirmPassword" placeholder="Confirm Password" style="display:none;">

  <button onclick="handleAction()" id="actionBtn">Login</button>

  <div class="error" id="errorMsg"></div>

  <div class="link" onclick="toggleSignup()" id="signupToggle">Don't have an account? Signup</div>
</div>

<script>
  let isSignup = false;

  function toggleSignup() {
    isSignup = !isSignup;
    updateUI();
  }

  function updateUI() {
    const title = document.getElementById("title");
    const btn = document.getElementById("actionBtn");
    const confirm = document.getElementById("confirmPassword");
    const signupText = document.getElementById("signupToggle");
    const errorMsg = document.getElementById("errorMsg");

    errorMsg.innerText = "";

    if (isSignup) {
      title.innerText = "User Signup";
      btn.innerText = "Signup";
      confirm.style.display = "block";
      signupText.innerText = "Already have an account? Login";
    } else {
      title.innerText = "User Login";
      btn.innerText = "Login";
      confirm.style.display = "none";
      signupText.innerText = "Don't have an account? Signup";
    }
  }

  function handleAction() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const confirmPassword = document.getElementById("confirmPassword").value.trim();
    const errorMsg = document.getElementById("errorMsg");

    if (isSignup) {
      if (!username || !password || !confirmPassword) {
        errorMsg.innerText = "All fields are required";
        return;
      }
      if (password !== confirmPassword) {
        errorMsg.innerText = "Passwords do not match";
        return;
      }

      let users = JSON.parse(localStorage.getItem("users")) || [];
      if (users.find(u => u.username === username)) {
        errorMsg.innerText = "User already exists";
        return;
      }

      users.push({ username, password });
      localStorage.setItem("users", JSON.stringify(users));

      alert("Signup Successful! Please login.");
      isSignup = false;
      updateUI();
      return;
    }

    // Login
    let users = JSON.parse(localStorage.getItem("users")) || [];
    const user = users.find(u => u.username === username && u.password === password);

    if (user) {
      window.location.href = "index.html";
    } else {
      errorMsg.innerText = "Invalid Username or Password";
    }
  }
</script>

</body>
</html>
